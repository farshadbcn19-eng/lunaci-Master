name: Add Category Banner Code to functions.php (one-time write)

on:
  workflow_dispatch:

jobs:
  add-banner-code:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Append lunaci_category_banner to active theme functions.php and verify
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---APPENDING CODE---";
             echo "" | base64 -d > /tmp/append-category-banner.php;
             wp eval-file /tmp/append-category-banner.php --path="$WP_PATH";
             rm -f /tmp/append-category-banner.php;
             echo "---VERIFY: grep confirms new function in functions.php---";
             ACTIVE_THEME=$(wp theme list --status=active --field=name --path="$WP_PATH");
             grep -n "function lunaci_category_banner\|add_action( .woocommerce_before_main_content., .lunaci_category_banner." "$WP_PATH/wp-content/themes/$ACTIVE_THEME/functions.php";
             echo "---GET CATEGORY LINKS---";
             echo "" | base64 -d > /tmp/get-category-links.php;
             wp eval-file /tmp/get-category-links.php --path="$WP_PATH" > /tmp/category-links.txt;
             cat /tmp/category-links.txt;
             echo "---CURL EACH CATEGORY PAGE FOR BANNER HTML---";
             while IFS=": " read -r slug url; do
               if [ -n "$url" ]; then
                 echo "-- $slug ($url) --";
                 http_code=$(curl -s -o /tmp/page.html --connect-timeout 10 --max-time 20 -w "%{http_code}" "$url");
                 echo "http_code=$http_code";
                 grep -o "class=\"lunaci-category-banner\"" /tmp/page.html || echo "banner div NOT found";
               fi;
             done < /tmp/category-links.txt;
             rm -f /tmp/get-category-links.php /tmp/category-links.txt /tmp/page.html'
