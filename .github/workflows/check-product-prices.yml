name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            "wp post list --post_type=product --fields=ID,post_title --format=csv --path=~/public_html && \
             wp post list --post_type=product --field=ID --path=~/public_html | while read id; do \
               echo \"\$id,\$(wp post meta get \$id _regular_price --path=~/public_html)\"; \
             done"
