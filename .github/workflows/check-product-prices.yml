name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---ACTIVE THEME + FUNCTIONS.PHP CHECK---";
             ACTIVE_THEME=$(wp theme list --status=active --field=name --path="$WP_PATH");
             echo "Active theme slug: $ACTIVE_THEME";
             ls -la "$WP_PATH/wp-content/themes/$ACTIVE_THEME/functions.php" 2>/dev/null || echo "(no functions.php in active theme dir)";
             echo "-- template/stylesheet from wp option --";
             wp option get template --path="$WP_PATH";
             wp option get stylesheet --path="$WP_PATH";
             echo "-- name collision check in active theme functions.php --";
             grep -n "function lunaci_category_banner" "$WP_PATH/wp-content/themes/$ACTIVE_THEME/functions.php" 2>/dev/null || echo "no existing lunaci_category_banner function found";
             echo "-- last 15 lines of functions.php (for context) --";
             tail -15 "$WP_PATH/wp-content/themes/$ACTIVE_THEME/functions.php" 2>/dev/null'
