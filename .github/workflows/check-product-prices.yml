name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             wp post list --post_type=product --fields=ID,post_title,post_status --format=table --path="$WP_PATH" && \
             echo "---PRICES---" && \
             wp post list --post_type=product --field=ID --path="$WP_PATH" | while read id; do \
               price=$(wp post meta get $id _regular_price --path="$WP_PATH"); \
               title=$(wp post get $id --field=post_title --path="$WP_PATH"); \
               echo "$id | $title | $price"; \
             done'

      - name: Curl /products/ page (public, read-only)
        run: |
          URL="https://lunacibarcelona.com/products/"
          echo "-- $URL --"
          http_code=$(curl -s -o /tmp/products.html --connect-timeout 10 --max-time 20 -w "%{http_code}" "$URL")
          echo "http_code=$http_code"
          echo "---response headers---"
          curl -s -D - -o /dev/null --connect-timeout 10 --max-time 20 "$URL" | head -30
          echo "---page size (bytes)---"
          wc -c /tmp/products.html
          echo "---check for fatal/critical error strings---"
          grep -qi "fatal error\|critical error" /tmp/products.html && echo "FOUND fatal/critical error string" || echo "no fatal/critical error string found"
          echo "---all hrefs found on the page---"
          grep -oE 'href="[^"]*"' /tmp/products.html | sort -u
          echo "---context around each 'Discover Collection' occurrence---"
          grep -o '.\{80\}Discover Collection.\{120\}' /tmp/products.html || echo "no 'Discover Collection' text found in rendered HTML"
