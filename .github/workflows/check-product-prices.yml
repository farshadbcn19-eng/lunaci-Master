name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---1. RAW DB QUERY: posts with Discover Collection in _elementor_data---";
             wp db query "SELECT post_id FROM wp_postmeta WHERE meta_key='"'"'_elementor_data'"'"' AND meta_value LIKE '"'"'%Discover Collection%'"'"'" --path="$WP_PATH";
             echo "---1b. EXTRACTED LINKS FROM _elementor_data---";
             echo "" | base64 -d > /tmp/extract-discover-links.php;
             wp eval-file /tmp/extract-discover-links.php --path="$WP_PATH";
             rm -f /tmp/extract-discover-links.php;
             echo "---2. PAGES: check for shop/products slug---";
             wp post list --post_type=page --fields=ID,post_title,post_name,post_status --format=table --path="$WP_PATH";
             echo "---3. WOOCOMMERCE SHOP PAGE---";
             SHOP_PAGE_ID=$(wp option get woocommerce_shop_page_id --path="$WP_PATH");
             echo "woocommerce_shop_page_id: $SHOP_PAGE_ID";
             if [ -n "$SHOP_PAGE_ID" ] && [ "$SHOP_PAGE_ID" != "0" ]; then
               wp post get "$SHOP_PAGE_ID" --fields=ID,post_title,post_name,post_status --format=table --path="$WP_PATH";
             else
               echo "No shop page set (ID is 0 or empty)";
             fi'
