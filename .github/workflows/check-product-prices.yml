name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---FRESH DUMP of post 61 _elementor_data html widgets (right now)---";
             echo "" | base64 -d > /tmp/dump-post61-html.php;
             wp eval-file /tmp/dump-post61-html.php --path="$WP_PATH" > /tmp/post61-dump.txt;
             rm -f /tmp/dump-post61-html.php;
             echo "---grep for Discover Collection in fresh DB dump---";
             grep -o ".\{60\}Discover Collection.\{100\}" /tmp/post61-dump.txt || echo "NOT FOUND in fresh DB dump";
             echo "---grep for cat-link hrefs in fresh DB dump---";
             grep -oE "href=\\\\?\"[^\"]*\\\\?\" class=\\\\?\"cat-link\\\\?\"" /tmp/post61-dump.txt || grep -oE "cat-link.{0,200}" /tmp/post61-dump.txt || echo "no cat-link markers found in dump";
             echo "---wc -l /tmp/post61-dump.txt---";
             wc -l /tmp/post61-dump.txt'

      - name: Curl /products/ page (public, read-only)
        run: |
          URL="https://lunacibarcelona.com/products/"
          echo "-- $URL --"
          http_code=$(curl -s -o /tmp/products.html --connect-timeout 10 --max-time 20 -w "%{http_code}" "$URL")
          echo "http_code=$http_code"
          echo "---response headers---"
          curl -s -D - -o /dev/null --connect-timeout 10 --max-time 20 "$URL" | head -30
          echo "---page size (bytes)---"
          wc -c /tmp/products.html
          echo "---check for fatal/critical error strings---"
          grep -qi "fatal error\|critical error" /tmp/products.html && echo "FOUND fatal/critical error string" || echo "no fatal/critical error string found"
          echo "---all hrefs found on the page---"
          grep -oE 'href="[^"]*"' /tmp/products.html | sort -u
          echo "---context around each 'Discover Collection' occurrence---"
          grep -o '.\{80\}Discover Collection.\{120\}' /tmp/products.html || echo "no 'Discover Collection' text found in rendered HTML"
          echo "---check for other markers of the cat-grid section (cat-card, cat-grid, Philosophy strip text)---"
          grep -oE 'class="cat-(grid|card|link|overlay|name|tag)"|Collection I{1,3}V?|philosophy' /tmp/products.html | sort -u || echo "none of these markers found"
          echo "---retry with Cache-Control: no-cache header (read-only, no server state change)---"
          http_code2=$(curl -s -o /tmp/products_nocache.html --connect-timeout 10 --max-time 20 -H "Cache-Control: no-cache" -H "Pragma: no-cache" -w "%{http_code}" "https://lunacibarcelona.com/products/?nocache=$(date +%s)")
          echo "http_code2=$http_code2"
          curl -s -D - -o /dev/null --connect-timeout 10 --max-time 20 -H "Cache-Control: no-cache" "https://lunacibarcelona.com/products/?nocache=$(date +%s)" | grep -i "x-litespeed-cache"
          echo "---page size (bytes) of no-cache attempt---"
          wc -c /tmp/products_nocache.html
          echo "---'Discover Collection' in no-cache attempt---"
          grep -o '.\{80\}Discover Collection.\{120\}' /tmp/products_nocache.html || echo "still not found in no-cache attempt"
