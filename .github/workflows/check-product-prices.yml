name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---STEP 1: ACTIVE CACHING PLUGINS---";
             wp plugin list --status=active --path="$WP_PATH" | grep -iE "cache|litespeed|hostinger" || echo "no obvious caching plugin found among active plugins";
             echo "---STEP 2: FULL CURL WITH HEADERS FOR face CATEGORY (cache indicators + broader image search)---";
             http_code=$(curl -s -D /tmp/headers.txt -o /tmp/facepage.html --connect-timeout 10 --max-time 20 -w "%{http_code}" "https://lunacibarcelona.com/product-category/face/");
             echo "http_code=$http_code";
             echo "-- response headers (cache-related) --";
             grep -iE "cache|age:|x-litespeed|x-lscache" /tmp/headers.txt || echo "no cache-related headers found";
             echo "-- broader search for lunaci-category in raw HTML (any attribute) --";
             grep -o "lunaci-category-[a-zA-Z0-9._-]*" /tmp/facepage.html | sort -u || echo "no lunaci-category filename reference found anywhere in HTML";
             echo "-- data-src / srcset check --";
             grep -oE "(data-src|srcset)=\"[^\"]*\"" /tmp/facepage.html | head -10 || echo "no data-src/srcset attributes found";
             echo "-- retry with cache-busting query string --";
             http_code2=$(curl -s -o /tmp/facepage2.html --connect-timeout 10 --max-time 20 -w "%{http_code}" "https://lunacibarcelona.com/product-category/face/?nocache=$(date +%s)");
             echo "http_code2=$http_code2";
             grep -o "lunaci-category-[a-zA-Z0-9._-]*" /tmp/facepage2.html | sort -u || echo "no lunaci-category filename reference found (cache-busted request)";
             rm -f /tmp/headers.txt /tmp/facepage.html /tmp/facepage2.html'
