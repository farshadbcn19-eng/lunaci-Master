name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---CASE-INSENSITIVE CHECK FOR lips CATEGORY BANNER IMAGE---";
             http_code=$(curl -s -o /tmp/lipspage.html --connect-timeout 10 --max-time 20 -w "%{http_code}" "https://lunacibarcelona.com/product-category/lips/");
             echo "http_code=$http_code";
             grep -oiE "lunaci-category-lips[a-zA-Z0-9._-]*" /tmp/lipspage.html | sort -u || echo "still no lunaci-category-lips filename found (case-insensitive)";
             echo "-- broader: any lunaci-category- filename, any case --";
             grep -oi "lunaci-category-[a-zA-Z0-9._-]*" /tmp/lipspage.html | sort -u || echo "no lunaci-category- filename found at all";
             rm -f /tmp/lipspage.html'
