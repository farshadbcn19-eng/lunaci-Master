name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---EMERGENCY CHECK: current state of post 61 _elementor_data + revisions---";
             echo "" | base64 -d > /tmp/emergency-check-post61.php;
             wp eval-file /tmp/emergency-check-post61.php --path="$WP_PATH";
             rm -f /tmp/emergency-check-post61.php;
             echo "---LIVE PAGE VISUAL CHECK (cache-bypassed)---";
             http_code=$(curl -s -o /tmp/products_emergency.html --connect-timeout 10 --max-time 20 -H "Cache-Control: no-cache" -w "%{http_code}" "https://lunacibarcelona.com/products/?nocache=$(date +%s)");
             echo "http_code=$http_code";
             grep -qi "fatal error\|critical error" /tmp/products_emergency.html && echo "FOUND fatal/critical error string" || echo "no fatal/critical error string found";
             echo "page size: $(wc -c < /tmp/products_emergency.html) bytes";
             echo "cat-grid present: $(grep -c "cat-grid" /tmp/products_emergency.html || echo 0)";
             echo "cat-card count: $(grep -o "cat-card" /tmp/products_emergency.html | wc -l)";
             echo "cat-link count: $(grep -o "cat-link" /tmp/products_emergency.html | wc -l)";
             echo "Discover Collection count: $(grep -o "Discover Collection" /tmp/products_emergency.html | wc -l)";
             echo "hero/philosophy present: $(grep -c "page-hero" /tmp/products_emergency.html || echo 0)";
             rm -f /tmp/products_emergency.html'
