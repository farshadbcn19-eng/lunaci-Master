name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---STEP 1: wp post_type=code-snippets attempt---";
             wp post list --post_type=code-snippets --fields=ID,post_title,post_status --format=table --path="$WP_PATH";
             echo "---STEP 1+2: FIND lunaci_category_banner IN CODE SNIPPETS PLUGIN (custom table fallback)---";
             echo "" | base64 -d > /tmp/find-code-snippets-banner.php;
             wp eval-file /tmp/find-code-snippets-banner.php --path="$WP_PATH";
             rm -f /tmp/find-code-snippets-banner.php;
             echo "---STEP 3: CATEGORY LINKS + CURL CHECK---";
             echo "" | base64 -d > /tmp/get-category-links2.php;
             wp eval-file /tmp/get-category-links2.php --path="$WP_PATH" > /tmp/cat-links.txt;
             rm -f /tmp/get-category-links2.php;
             cat /tmp/cat-links.txt;
             while IFS=": " read -r slug url; do
               if [ -z "$url" ]; then continue; fi;
               echo "== $slug ($url) ==";
               http_code=$(curl -s -o /tmp/catpage.html --connect-timeout 10 --max-time 20 -w "%{http_code}" "$url");
               echo "http_code=$http_code";
               grep -oE "class=\"[^\"]*lunaci[^\"]*\"" /tmp/catpage.html || echo "no lunaci-related class found";
               grep -oE "src=\"[^\"]*lunaci-category[^\"]*\"" /tmp/catpage.html || echo "no lunaci-category image src found";
               grep -oE "wp-image-[0-9]+" /tmp/catpage.html || echo "no wp-image-ID class found";
             done < /tmp/cat-links.txt;
             rm -f /tmp/cat-links.txt /tmp/catpage.html'
