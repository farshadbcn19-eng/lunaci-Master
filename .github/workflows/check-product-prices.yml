name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---STEP 1: ATTACHMENT LOOKUP PER FILE (with post_date)---";
             for slug in lunaci-category-face lunaci-category-eyes lunaci-category-lips lunaci-category-nails; do
               echo "-- $slug --";
               wp post list --post_type=attachment --name="$slug" --fields=ID,post_title,post_name,post_date --format=table --path="$WP_PATH";
             done;
             echo "---STEP 2: PREVIOUS IMPORT IDS (621,623,625,627) STATUS---";
             wp post list --post__in=621,623,625,627 --post_type=attachment --fields=ID,post_title,post_status --format=table --path="$WP_PATH";
             echo "-- same IDs, any post_type/any status --";
             wp post list --post__in=621,623,625,627 --post_status=any --fields=ID,post_title,post_type,post_status --format=table --path="$WP_PATH";
             echo "-- attached files for NEW attachment IDs 629,631,633,635 --";
             for id in 629 631 633 635; do
               echo "$id: $(wp post meta get $id _wp_attached_file --path="$WP_PATH" 2>/dev/null) | status=$(wp post get $id --field=post_status --path="$WP_PATH" 2>/dev/null)";
             done;
             echo "---STEP 3 (WPCODE RE-CHECK): PLUGIN ACTIVE STATUS + SNIPPETS IF ANY---";
             wp plugin list --status=active --path="$WP_PATH" | grep -i wpcode || echo "WPCode not found among active plugins";
             wp post list --post_type=wpcode --fields=ID,post_title,post_status --format=table --path="$WP_PATH" 2>/dev/null || echo "(no wpcode post_type / no snippets, or WPCode inactive)"'
