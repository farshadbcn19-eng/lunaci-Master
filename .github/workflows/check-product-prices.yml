name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---CATEGORY BANNER PNG SEARCH---";
             FOUND_FILES=$(find "$WP_PATH/wp-content/uploads" \( -iname "lunaci-category-face.png" -o -iname "lunaci-category-eyes.png" -o -iname "lunaci-category-lips.png" -o -iname "lunaci-category-nails.png" \) 2>/dev/null);
             if [ -z "$FOUND_FILES" ]; then
               echo "No matching files found under $WP_PATH/wp-content/uploads";
             else
               echo "$FOUND_FILES" | while read -r f; do ls -lh "$f"; done;
             fi;
             echo "---IMAGEMAGICK AVAILABILITY---";
             (which convert && convert -version | head -1) || echo "convert (ImageMagick) not found in PATH";
             echo "---PHP IMAGE LIBRARY AVAILABILITY---";
             php -r "echo (\"GD: \" . (extension_loaded(\"gd\") ? \"yes\" : \"no\") . \"\\n\"); echo (\"Imagick ext: \" . (extension_loaded(\"imagick\") ? \"yes\" : \"no\") . \"\\n\"); echo (\"imagecreatefrompng(): \" . (function_exists(\"imagecreatefrompng\") ? \"yes\" : \"no\") . \"\\n\"); echo (\"imagejpeg(): \" . (function_exists(\"imagejpeg\") ? \"yes\" : \"no\") . \"\\n\"); echo (\"Imagick class: \" . (class_exists(\"Imagick\") ? \"yes\" : \"no\") . \"\\n\");"'
