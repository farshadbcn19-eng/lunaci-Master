name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             wp post list --post_type=product --fields=ID,post_title,post_status --format=table --path="$WP_PATH" && \
             echo "---PRICES---" && \
             wp post list --post_type=product --field=ID --path="$WP_PATH" | while read id; do \
               price=$(wp post meta get $id _regular_price --path="$WP_PATH"); \
               title=$(wp post get $id --field=post_title --path="$WP_PATH"); \
               echo "$id | $title | $price"; \
             done; \
             echo "---HEO PLUGIN HEADER---"; \
             head -30 "$WP_PATH/wp-content/plugins/hostinger-easy-onboarding/hostinger-easy-onboarding.php" 2>/dev/null || echo "(main file not at expected path)"; \
             echo "---HEO PLUGIN FILE TREE---"; \
             find "$WP_PATH/wp-content/plugins/hostinger-easy-onboarding" -maxdepth 2 2>/dev/null || echo "(plugin dir not found)"; \
             echo "---HEO CAPABILITY KEYWORD SCAN (ssl/certificate/backup/dns/nameserver/cron)---"; \
             grep -rliE "ssl|certificate|https_enforce|backup|dns_record|dns_zone|nameserver|cron_schedule|wp_schedule_event" \
               "$WP_PATH/wp-content/plugins/hostinger-easy-onboarding" --include=*.php 2>/dev/null; \
             echo "(if no lines above, none of those keywords appear in the plugin source)"; \
             echo "---HEO CRON EVENTS---"; \
             wp cron event list --path="$WP_PATH" --format=table 2>/dev/null | grep -i "onboard\|heo\|hostinger"; \
             echo "(if no lines above, no matching cron events found)"; \
             echo "---HEO OPTIONS IN DB---"; \
             wp option list --search="*hostinger_easy_onboarding*" --path="$WP_PATH" 2>/dev/null; \
             echo "(if no lines above, no matching options found)"; \
             echo "---HOSTINGER (main) PLUGIN HEADER for comparison---"; \
             head -20 "$WP_PATH/wp-content/plugins/hostinger/hostinger.php" 2>/dev/null || echo "(main file not at expected path)"'
