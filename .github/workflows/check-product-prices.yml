name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=5 -o ServerAliveCountMax=3 -o ConnectTimeout=15 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             wp post list --post_type=product --fields=ID,post_title,post_status --format=table --path="$WP_PATH" && \
             echo "---PRICES---" && \
             wp post list --post_type=product --field=ID --path="$WP_PATH" | while read id; do \
               price=$(wp post meta get $id _regular_price --path="$WP_PATH"); \
               title=$(wp post get $id --field=post_title --path="$WP_PATH"); \
               echo "$id | $title | $price"; \
             done; \
             echo "---LIVE HOMEPAGE CHECK (3x)---"; \
             for i in 1 2 3; do \
               CODE=$(curl -sk --connect-timeout 10 --max-time 20 -o /tmp/home_check_$i.html -w "%{http_code}" https://lunacibarcelona.com/); \
               ERR=$(grep -io "critical error\|fatal error" /tmp/home_check_$i.html | head -1); \
               echo "attempt $i: http_code=$CODE error_found=${ERR:-none}"; \
               rm -f /tmp/home_check_$i.html; \
               sleep 2; \
             done'
