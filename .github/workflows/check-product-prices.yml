name: Check Product Prices (Read-Only)

on:
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: List products and prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               echo "--- $HOME listing ---"; ls -la "$HOME";
               if [ -d "$HOME/domains" ]; then echo "--- $HOME/domains listing ---"; ls -la "$HOME/domains"; fi;
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---POST 637 DIRECT FIELDS---";
             wp post get 637 --field=post_title --path="$WP_PATH";
             wp post get 637 --field=post_name --path="$WP_PATH";
             wp post get 637 --field=post_status --path="$WP_PATH";
             wp post get 637 --field=post_type --path="$WP_PATH";
             echo "---POST 637 FULL (fields)---";
             wp post get 637 --fields=ID,post_title,post_name,post_status,post_type --format=table --path="$WP_PATH";
             echo "---wp post list ALL STATUSES, ID 637---";
             wp post list --post_type=product --post_status=any --post__in=637 --fields=ID,post_title,post_status,post_name --format=table --path="$WP_PATH";
             echo "---wp post list name=concealer, ALL STATUSES---";
             wp post list --post_type=product --post_status=any --name=concealer --fields=ID,post_title,post_status,post_name --format=table --path="$WP_PATH";
             echo "---wp post list name=Concealer (capitalized), ALL STATUSES---";
             wp post list --post_type=product --post_status=any --name=Concealer --fields=ID,post_title,post_status,post_name --format=table --path="$WP_PATH";
             echo "---wp post list ALL DRAFT PRODUCTS---";
             wp post list --post_type=product --post_status=draft --fields=ID,post_title,post_status,post_name --format=table --path="$WP_PATH"'
