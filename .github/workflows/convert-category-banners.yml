name: Convert Category Banner PNGs to JPG (one-time write)

on:
  workflow_dispatch:

jobs:
  convert-banners:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Convert PNGs to JPG (quality 90) and verify
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             FOUND_FILES=$(find "$WP_PATH/wp-content/uploads" \( -iname "lunaci-category-face.png" -o -iname "lunaci-category-eyes.png" -o -iname "lunaci-category-lips.png" -o -iname "lunaci-category-nails.png" \) 2>/dev/null);
             if [ -z "$FOUND_FILES" ]; then
               echo "ERROR: none of the 4 category banner PNGs were found under $WP_PATH/wp-content/uploads";
               exit 1;
             fi;
             echo "$FOUND_FILES" | wc -l | xargs echo "Found PNG count:";
             echo "" | base64 -d > /tmp/convert-to-jpg.php;
             echo "---CONVERTING---";
             echo "$FOUND_FILES" | while read -r f; do
               wp eval-file /tmp/convert-to-jpg.php "$f" --path="$WP_PATH";
             done;
             rm -f /tmp/convert-to-jpg.php;
             echo "---VERIFY (new JPGs alongside untouched PNGs)---";
             find "$WP_PATH/wp-content/uploads" \( -iname "lunaci-category-face.jpg" -o -iname "lunaci-category-eyes.jpg" -o -iname "lunaci-category-lips.jpg" -o -iname "lunaci-category-nails.jpg" -o -iname "lunaci-category-face.png" -o -iname "lunaci-category-eyes.png" -o -iname "lunaci-category-lips.png" -o -iname "lunaci-category-nails.png" \) 2>/dev/null | sort | while read -r f; do ls -lh "$f"; done'
