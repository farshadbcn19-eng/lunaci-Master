name: Create Concealer Placeholder Product (one-time write)

on:
  workflow_dispatch:

jobs:
  create-concealer:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Create draft Concealer product and verify
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---CREATING CONCEALER PLACEHOLDER (draft, no price, no image)---";
             echo "" | base64 -d > /tmp/create-concealer-placeholder.php;
             wp eval-file /tmp/create-concealer-placeholder.php --path="$WP_PATH";
             rm -f /tmp/create-concealer-placeholder.php;
             echo "---VERIFY VIA wp post list (name=concealer)---";
             wp post list --post_type=product --name=concealer --fields=ID,post_title,post_status,post_name --format=table --path="$WP_PATH"'
