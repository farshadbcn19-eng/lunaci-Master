name: Create New SKUs (One-Time Write)

on:
  workflow_dispatch:

jobs:
  create-products:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Create Lip Pencil, Eyebrow Pencil, Eye Pencil, Nail Polish Long Lasting, Shadow
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "" | base64 -d > /tmp/lunaci-new-skus.php;
             wp eval-file /tmp/lunaci-new-skus.php --path="$WP_PATH";
             rm -f /tmp/lunaci-new-skus.php;
             echo "--- Verification (product + variation listing) ---";
             wp post list --post_type=product,product_variation --fields=ID,post_title,post_status,post_parent --format=table --path="$WP_PATH"'
