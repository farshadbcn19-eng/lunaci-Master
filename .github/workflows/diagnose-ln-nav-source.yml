name: Diagnose ln-nav header source (Elementor + Code Snippets + WPCode + filesystem, Read-Only)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Read post 57 _elementor_data, Code Snippets table, WPCode CPT, and grep theme/plugin files for ln-nav (read-only)
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";

             echo "" | base64 -d > /tmp/diagnose-ln-nav-source.php;

             php -l /tmp/diagnose-ln-nav-source.php;
             LINT_STATUS=$?;
             if [ "$LINT_STATUS" -ne 0 ]; then
               echo "ABORT: php -l failed on diagnostic script";
               rm -f /tmp/diagnose-ln-nav-source.php;
               exit 1;
             fi;

             wp eval-file /tmp/diagnose-ln-nav-source.php --path="$WP_PATH";
             EVAL_STATUS=$?;
             rm -f /tmp/diagnose-ln-nav-source.php;
             if [ "$EVAL_STATUS" -ne 0 ]; then
               echo "ABORT: wp eval-file failed (exit code $EVAL_STATUS)";
               exit 1;
             fi;

             echo "";
             echo "=====================================================";
             echo "PART 5: grep theme/plugin/mu-plugins filesystem for ln-nav (plain text search, no PHP execution)";
             echo "=====================================================";
             MATCHES=$(grep -rln "ln-nav" "$WP_PATH/wp-content/themes" "$WP_PATH/wp-content/plugins" "$WP_PATH/wp-content/mu-plugins" 2>/dev/null);
             if [ -z "$MATCHES" ]; then
               echo "no files under themes/plugins/mu-plugins reference ln-nav";
             else
               echo "$MATCHES" | while read -r F; do
                 echo "----- $F -----";
                 grep -n "ln-nav" "$F";
                 echo "";
               done;
             fi;

             echo "OK: diagnostic completed (no writes)"'
