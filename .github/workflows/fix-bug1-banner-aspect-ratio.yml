name: Fix Bug 1 - category banner mobile aspect-ratio (one-time write)

on:
  workflow_dispatch:

jobs:
  fix-banner-aspect-ratio:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Fix mobile aspect-ratio, purge cache, verify
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";

             echo "---STEP 1: FIX (updates wp_snippets.code for snippet id=7 only if all safety checks pass)---";
             echo "" | base64 -d > /tmp/fix-bug1.php;
             php -l /tmp/fix-bug1.php;
             wp eval-file /tmp/fix-bug1.php --path="$WP_PATH";
             FIX_STATUS=$?;
             rm -f /tmp/fix-bug1.php;
             if [ "$FIX_STATUS" -ne 0 ]; then
               echo "ABORT: fix step failed - stopping here, NOT purging cache or claiming success";
               exit 1;
             fi;

             echo "---STEP 2: PURGE CACHE---";
             wp litespeed-purge all --path="$WP_PATH";
             PURGE_STATUS=$?;
             if [ "$PURGE_STATUS" -ne 0 ]; then
               wp cache flush --path="$WP_PATH";
             fi;

             echo "---STEP 3: VERIFY LIVE CATEGORY PAGES (cache-bypassed)---";
             for slug in face lips nails eyes; do
               http_code=$(curl -s -o /tmp/cat_${slug}.html --connect-timeout 10 --max-time 20 -H "Cache-Control: no-cache" -w "%{http_code}" "https://lunacibarcelona.com/product-category/${slug}/?nocache=$(date +%s)");
               echo "=== ${slug}: http_code=${http_code} ===";
               grep -qi "fatal error\|critical error" /tmp/cat_${slug}.html && echo "FOUND fatal/critical error string" || echo "no fatal/critical error string found";
               echo "aspect-ratio: 3 / 2 count: $(grep -o "aspect-ratio: 3 / 2" /tmp/cat_${slug}.html | wc -l)";
               echo "aspect-ratio: 4 / 5 count (should be 0): $(grep -o "aspect-ratio: 4 / 5" /tmp/cat_${slug}.html | wc -l)";
               rm -f /tmp/cat_${slug}.html;
             done'
