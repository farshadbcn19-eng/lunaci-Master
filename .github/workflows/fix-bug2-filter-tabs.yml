name: Fix Bug 2 - filter tabs real links + Nails (one-time write) v3

on:
  workflow_dispatch:

jobs:
  fix-filter-tabs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Prepare, lint (shell-level php -l), commit, purge cache, verify
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";

             echo "---STEP 1: PREPARE (read-only - reads current code, builds candidate in memory, writes candidate file only if all checks pass; does NOT touch the database)---";
             echo "" | base64 -d > /tmp/prepare-bug2.php;
             php -l /tmp/prepare-bug2.php;
             wp eval-file /tmp/prepare-bug2.php --path="$WP_PATH";
             PREPARE_STATUS=$?;
             rm -f /tmp/prepare-bug2.php;
             if [ "$PREPARE_STATUS" -ne 0 ]; then
               echo "ABORT: prepare step failed - no candidate file trusted, no DB write attempted";
               rm -f /tmp/lunaci_snippet6_reconstructed.php;
               exit 1;
             fi;

             echo "---STEP 2: LINT the reconstructed candidate file at the SHELL level (php -l over SSH, not exec() inside PHP - exec() is disabled on this host)---";
             php -l /tmp/lunaci_snippet6_reconstructed.php;
             LINT_STATUS=$?;
             if [ "$LINT_STATUS" -ne 0 ]; then
               echo "ABORT: php -l failed on reconstructed candidate file - refusing to write to DB";
               rm -f /tmp/lunaci_snippet6_reconstructed.php;
               exit 1;
             fi;
             echo "OK: php -l passed on candidate file";

             echo "---STEP 3: COMMIT (only reached because STEP 2 php -l passed; re-runs the same structural checks against the verified file, then updates DB and byte-verifies)---";
             echo "" | base64 -d > /tmp/commit-bug2.php;
             php -l /tmp/commit-bug2.php;
             wp eval-file /tmp/commit-bug2.php --path="$WP_PATH";
             COMMIT_STATUS=$?;
             rm -f /tmp/commit-bug2.php /tmp/lunaci_snippet6_reconstructed.php;
             if [ "$COMMIT_STATUS" -ne 0 ]; then
               echo "ABORT: commit step failed verification - stopping here, NOT purging cache or claiming success";
               exit 1;
             fi;

             echo "---STEP 4: PURGE CACHE---";
             wp litespeed-purge all --path="$WP_PATH";
             PURGE_STATUS=$?;
             if [ "$PURGE_STATUS" -ne 0 ]; then
               wp cache flush --path="$WP_PATH";
             fi;

             echo "---STEP 5: VERIFY LIVE PAGES (cache-bypassed)---";
             for path in "shop" "product-category/face" "product-category/lips" "product-category/eyes" "product-category/nails"; do
               http_code=$(curl -s -o /tmp/page_check.html --connect-timeout 10 --max-time 20 -H "Cache-Control: no-cache" -w "%{http_code}" "https://lunacibarcelona.com/${path}/?nocache=$(date +%s)");
               echo "=== /${path}/: http_code=${http_code} ===";
               grep -qi "fatal error\|critical error" /tmp/page_check.html && echo "FOUND fatal/critical error string" || echo "no fatal/critical error string found";
               echo "real <a class=lunaci-filter-btn links: $(grep -o "<a class=\"lunaci-filter-btn[^\"]*\" href=\"[^\"]*\"" /tmp/page_check.html | wc -l) (expect 5)";
               echo "old <button data-filter markup remaining: $(grep -o "data-filter=" /tmp/page_check.html | wc -l) (expect 0)";
               echo "old filter-toggle <script> remaining: $(grep -o "products.forEach" /tmp/page_check.html | wc -l) (expect 0)";
               echo "--- active tab link on this page ---";
               grep -oE "<a class=\"lunaci-filter-btn active\" href=\"[^\"]*\">[^<]*</a>" /tmp/page_check.html;
               echo "--- all 5 tab links ---";
               grep -oE "<a class=\"lunaci-filter-btn[^\"]*\" href=\"[^\"]*\">[^<]*</a>" /tmp/page_check.html;
               rm -f /tmp/page_check.html;
             done'
