name: Fix Bug 2 - filter tabs real links + Nails (one-time write)

on:
  workflow_dispatch:

jobs:
  fix-filter-tabs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Fix filter tabs, purge cache, verify
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";

             echo "---STEP 1: FIX (updates wp_snippets.code for snippet id=6 only if all safety checks pass)---";
             echo "" | base64 -d > /tmp/fix-bug2.php;
             php -l /tmp/fix-bug2.php;
             wp eval-file /tmp/fix-bug2.php --path="$WP_PATH";
             FIX_STATUS=$?;
             rm -f /tmp/fix-bug2.php;
             if [ "$FIX_STATUS" -ne 0 ]; then
               echo "ABORT: fix step failed - stopping here, NOT purging cache or claiming success";
               exit 1;
             fi;

             echo "---STEP 2: PURGE CACHE---";
             wp litespeed-purge all --path="$WP_PATH";
             PURGE_STATUS=$?;
             if [ "$PURGE_STATUS" -ne 0 ]; then
               wp cache flush --path="$WP_PATH";
             fi;

             echo "---STEP 3: VERIFY LIVE PAGES (cache-bypassed)---";
             for path in "shop" "product-category/face" "product-category/lips" "product-category/eyes" "product-category/nails"; do
               http_code=$(curl -s -o /tmp/page_check.html --connect-timeout 10 --max-time 20 -H "Cache-Control: no-cache" -w "%{http_code}" "https://lunacibarcelona.com/${path}/?nocache=$(date +%s)");
               echo "=== /${path}/: http_code=${http_code} ===";
               grep -qi "fatal error\|critical error" /tmp/page_check.html && echo "FOUND fatal/critical error string" || echo "no fatal/critical error string found";
               echo "real <a class=lunaci-filter-btn links: $(grep -o "<a class=\"lunaci-filter-btn[^\"]*\" href=\"[^\"]*\"" /tmp/page_check.html | wc -l) (expect 5)";
               echo "old <button data-filter markup remaining: $(grep -o "data-filter=" /tmp/page_check.html | wc -l) (expect 0)";
               echo "old filter-toggle <script> remaining: $(grep -o "products.forEach" /tmp/page_check.html | wc -l) (expect 0)";
               echo "--- active tab link on this page ---";
               grep -oE "<a class=\"lunaci-filter-btn active\" href=\"[^\"]*\">[^<]*</a>" /tmp/page_check.html;
               echo "--- all 5 tab links ---";
               grep -oE "<a class=\"lunaci-filter-btn[^\"]*\" href=\"[^\"]*\">[^<]*</a>" /tmp/page_check.html;
               rm -f /tmp/page_check.html;
             done'
