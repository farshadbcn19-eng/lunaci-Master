name: Fix Bug 3 - products page layout (Boxed to Full Width + Elementor Canvas template) (one-time write)

on:
  workflow_dispatch:

jobs:
  fix-products-page:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Fix container width + page template, purge cache, verify
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";

             echo "---STEP 1: FIX (validates BOTH content_width and page-template preconditions before writing anything; only then writes _elementor_data, then _wp_page_template, verifying each)---";
             echo "" | base64 -d > /tmp/fix-bug3.php;

             php -l /tmp/fix-bug3.php;
             LINT_STATUS=$?;
             if [ "$LINT_STATUS" -ne 0 ]; then
               echo "ABORT: php -l failed on fix script";
               rm -f /tmp/fix-bug3.php;
               exit 1;
             fi;

             wp eval-file /tmp/fix-bug3.php --path="$WP_PATH";
             FIX_STATUS=$?;
             rm -f /tmp/fix-bug3.php;
             if [ "$FIX_STATUS" -ne 0 ]; then
               echo "ABORT: fix step failed (exit code $FIX_STATUS) - stopping here, NOT purging cache or claiming success";
               exit 1;
             fi;

             echo "---STEP 2: PURGE CACHE---";
             wp litespeed-purge all --path="$WP_PATH";
             PURGE_STATUS=$?;
             if [ "$PURGE_STATUS" -ne 0 ]; then
               wp cache flush --path="$WP_PATH";
             fi;

             echo "---STEP 3: VERIFY LIVE /products/ PAGE (cache-bypassed)---";
             http_code=$(curl -s -o /tmp/products_check.html --connect-timeout 10 --max-time 20 -H "Cache-Control: no-cache" -w "%{http_code}" "https://lunacibarcelona.com/products/?nocache=$(date +%s)");
             echo "http_code=$http_code";
             echo "page size: $(wc -c < /tmp/products_check.html) bytes";
             grep -qi "fatal error\|critical error" /tmp/products_check.html && echo "FOUND fatal/critical error string" || echo "no fatal/critical error string found";
             echo "lp-header present (expect >=1): $(grep -o "lp-header" /tmp/products_check.html | wc -l)";
             echo "lp-footer present (expect >=1): $(grep -o "lp-footer" /tmp/products_check.html | wc -l)";
             echo "theme default header id=site-header remaining (expect 0): $(grep -o "id=\"site-header\"" /tmp/products_check.html | wc -l)";
             echo "cat-card count (expect 4): $(grep -o "class=\"cat-card\"" /tmp/products_check.html | wc -l)";
             rm -f /tmp/products_check.html'
