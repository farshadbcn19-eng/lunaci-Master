name: Purge Cache and Verify Category Banners (one-time write)

on:
  workflow_dispatch:

jobs:
  purge-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Purge cache (LiteSpeed, fallback to wp cache flush) and verify category banners render fresh
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---STEP 1: PURGE CACHE---";
             wp litespeed-purge all --path="$WP_PATH";
             PURGE_STATUS=$?;
             if [ "$PURGE_STATUS" -ne 0 ]; then
               echo "wp litespeed-purge all failed (exit $PURGE_STATUS) - falling back to wp cache flush";
               wp cache flush --path="$WP_PATH";
             fi;
             echo "---STEP 2: CATEGORY LINKS---";
             echo "" | base64 -d > /tmp/get-cat-links3.php;
             wp eval-file /tmp/get-cat-links3.php --path="$WP_PATH" > /tmp/cat-links.txt;
             rm -f /tmp/get-cat-links3.php;
             cat /tmp/cat-links.txt;
             echo "---STEP 3: CURL EACH CATEGORY PAGE (post-purge, checking for real image filename)---";
             while IFS=": " read -r slug url; do
               if [ -z "$url" ]; then continue; fi;
               echo "== $slug ($url) ==";
               http_code=$(curl -s -o /tmp/catpage.html --connect-timeout 10 --max-time 20 -w "%{http_code}" "$url");
               echo "http_code=$http_code";
               grep -oE "class=\"[^\"]*lunaci[^\"]*\"" /tmp/catpage.html | head -1 || echo "no lunaci-related class found";
               grep -o "lunaci-category-${slug}[a-zA-Z0-9._-]*" /tmp/catpage.html | sort -u || echo "no lunaci-category-${slug} image filename found";
             done < /tmp/cat-links.txt;
             rm -f /tmp/cat-links.txt /tmp/catpage.html'
