name: Fix Attachment IDs in Code Snippets Banner Snippet (one-time write)

on:
  workflow_dispatch:

jobs:
  fix-snippet-ids:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Update snippet id=7 attachment IDs (validated via php -l before saving) and verify
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "---STEP A: PREPARE CANDIDATE (replace IDs, write to file, DB NOT touched yet)---";
             echo "" | base64 -d > /tmp/prepare-snippet-update.php;
             wp eval-file /tmp/prepare-snippet-update.php --path="$WP_PATH";
             rm -f /tmp/prepare-snippet-update.php;
             echo "---STEP B: php -l ON CANDIDATE (must pass before any DB write)---";
             if [ ! -f /tmp/new_snippet_candidate.php ]; then
               echo "ERROR: candidate file was not created (prepare step aborted) - stopping, DB untouched.";
               exit 1;
             fi;
             php -l /tmp/new_snippet_candidate.php;
             LINT_STATUS=$?;
             if [ "$LINT_STATUS" -ne 0 ]; then
               echo "ERROR: php -l failed on candidate - stopping, DB untouched.";
               rm -f /tmp/new_snippet_candidate.php;
               exit 1;
             fi;
             echo "---STEP C: COMMIT UPDATE TO DB (only reached because php -l passed)---";
             echo "" | base64 -d > /tmp/commit-snippet-update.php;
             wp eval-file /tmp/commit-snippet-update.php --path="$WP_PATH";
             rm -f /tmp/commit-snippet-update.php /tmp/new_snippet_candidate.php;
             echo "---STEP D: CURL CATEGORY PAGES (confirm banner image now present)---";
             echo "" | base64 -d > /tmp/get-cat-links3.php;
             wp eval-file /tmp/get-cat-links3.php --path="$WP_PATH" > /tmp/cat-links.txt;
             rm -f /tmp/get-cat-links3.php;
             cat /tmp/cat-links.txt;
             while IFS=": " read -r slug url; do
               if [ -z "$url" ]; then continue; fi;
               echo "== $slug ($url) ==";
               http_code=$(curl -s -o /tmp/catpage.html --connect-timeout 10 --max-time 20 -w "%{http_code}" "$url");
               echo "http_code=$http_code";
               grep -oE "class=\"[^\"]*lunaci[^\"]*\"" /tmp/catpage.html || echo "no lunaci-related class found";
               grep -oE "src=\"[^\"]*lunaci-category[^\"]*\"" /tmp/catpage.html || echo "no lunaci-category image src found";
             done < /tmp/cat-links.txt;
             rm -f /tmp/cat-links.txt /tmp/catpage.html;
             echo "---STEP E: CURL HOMEPAGE (confirm still healthy)---";
             DOMAIN_HOST=$(basename "$(dirname "$WP_PATH")");
             http_code=$(curl -s -o /tmp/home.html --connect-timeout 10 --max-time 20 -w "%{http_code}" "https://$DOMAIN_HOST/");
             echo "homepage http_code=$http_code";
             if grep -qi "fatal error\|critical error" /tmp/home.html; then
               echo "STILL BROKEN: fatal/critical error string found on homepage";
             else
               echo "OK: homepage has no fatal/critical error string";
             fi;
             rm -f /tmp/home.html'
