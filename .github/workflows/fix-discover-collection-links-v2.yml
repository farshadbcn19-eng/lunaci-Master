name: Fix Discover Collection category links v2 (wp_slash, per-label verify) (one-time write)

on:
  workflow_dispatch:

jobs:
  fix-links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Prepare, validate, commit fix, purge cache, verify
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";

             echo "---STEP 1: PREPARE + VALIDATE (no DB write yet; per-label verification, no global remaining==0 check)---";
             echo "" | base64 -d > /tmp/prepare-cat-link-fix.php;
             php -l /tmp/prepare-cat-link-fix.php;

             echo "---STEP 2: RUN PREPARE (writes candidate JSON only if all checks pass)---";
             wp eval-file /tmp/prepare-cat-link-fix.php --path="$WP_PATH";
             PREPARE_STATUS=$?;
             if [ "$PREPARE_STATUS" -ne 0 ]; then
               echo "ABORT: prepare step failed - no DB write attempted";
               exit 1;
             fi;

             echo "---STEP 3: VALIDATE CANDIDATE IS WELL-FORMED JSON---";
             php -r "\$c = file_get_contents(\"/tmp/new_elementor_data_candidate.json\"); json_decode(\$c); if (json_last_error() !== JSON_ERROR_NONE) { echo \"INVALID JSON: \" . json_last_error_msg() . \"\n\"; exit(1);} echo \"JSON OK\n\";";
             JSONCHECK_STATUS=$?;
             if [ "$JSONCHECK_STATUS" -ne 0 ]; then
               echo "ABORT: candidate JSON check failed - no DB write attempted";
               exit 1;
             fi;

             echo "---STEP 4: COMMIT (only reached if steps 1-3 passed; wraps value with wp_slash() before update_post_meta, verifies via direct DB read against the in-memory computed value)---";
             echo "" | base64 -d > /tmp/commit-cat-link-fix.php;
             php -l /tmp/commit-cat-link-fix.php;
             wp eval-file /tmp/commit-cat-link-fix.php --path="$WP_PATH";
             COMMIT_STATUS=$?;
             rm -f /tmp/prepare-cat-link-fix.php /tmp/commit-cat-link-fix.php /tmp/new_elementor_data_candidate.json;
             if [ "$COMMIT_STATUS" -ne 0 ]; then
               echo "ABORT: commit step failed verification - stopping here, NOT purging cache or claiming success";
               exit 1;
             fi;

             echo "---STEP 5: PURGE CACHE---";
             wp litespeed-purge all --path="$WP_PATH";
             PURGE_STATUS=$?;
             if [ "$PURGE_STATUS" -ne 0 ]; then
               wp cache flush --path="$WP_PATH";
             fi;

             echo "---STEP 6: VERIFY LIVE PAGE (cache-bypassed, precise element counts)---";
             http_code=$(curl -s -o /tmp/products_verify.html --connect-timeout 10 --max-time 20 -H "Cache-Control: no-cache" -w "%{http_code}" "https://lunacibarcelona.com/products/?nocache=$(date +%s)");
             echo "http_code=$http_code";
             echo "page size: $(wc -c < /tmp/products_verify.html) bytes";
             grep -qi "fatal error\|critical error" /tmp/products_verify.html && echo "FOUND fatal/critical error string" || echo "no fatal/critical error string found";
             echo "---precise element counts (exact class attribute match, not raw substring)---";
             echo "cat-card: $(grep -o "class=\"cat-card\"" /tmp/products_verify.html | wc -l)";
             echo "cat-link: $(grep -o "class=\"cat-link\"" /tmp/products_verify.html | wc -l)";
             echo "cat-name: $(grep -o "class=\"cat-name\"" /tmp/products_verify.html | wc -l)";
             echo "Discover Collection: $(grep -o "Discover Collection" /tmp/products_verify.html | wc -l)";
             echo "---all cat-link hrefs (should be product-category links now, not /shop/)---";
             grep -oE "href=\"[^\"]*\" class=\"cat-link\"" /tmp/products_verify.html;
             echo "---remaining /shop/ cat-link occurrences (should be 0)---";
             grep -oE "href=\"[^\"]*shop/?\" class=\"cat-link\"" /tmp/products_verify.html | wc -l;
             rm -f /tmp/products_verify.html'
