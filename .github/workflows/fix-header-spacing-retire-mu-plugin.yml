name: Fix header spacing + retire old mobile-nav mu-plugin

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: "PART A: add top-spacing CSS to snippet id=8 | PART B: retire old mu-plugin"
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";

             echo "" | base64 -d > /tmp/part-a-css-spacing.php;

             php -l /tmp/part-a-css-spacing.php;
             LINT_STATUS=$?;
             if [ "$LINT_STATUS" -ne 0 ]; then
               echo "ABORT: php -l failed on PART A write script";
               rm -f /tmp/part-a-css-spacing.php;
               exit 1;
             fi;

             wp eval-file /tmp/part-a-css-spacing.php --path="$WP_PATH";
             PART_A_STATUS=$?;
             rm -f /tmp/part-a-css-spacing.php;
             if [ "$PART_A_STATUS" -ne 0 ]; then
               echo "ABORT: PART A failed (exit code $PART_A_STATUS) - stopping before PART B";
               exit 1;
             fi;

             echo "";
             echo "=====================================================";
             echo "PART B / STEP B1: PREPARE - confirm mu-plugin file exists with expected size";
             echo "=====================================================";
             MU_PLUGIN_PATH="$WP_PATH/wp-content/mu-plugins/lunaci-mobile-nav-fix.php";
             MU_PLUGIN_DISABLED_PATH="$WP_PATH/wp-content/mu-plugins/lunaci-mobile-nav-fix.php.disabled";
             EXPECTED_SIZE=6861;

             if [ ! -f "$MU_PLUGIN_PATH" ]; then
               echo "ERROR: expected file not found at $MU_PLUGIN_PATH";
               echo "ABORT";
               exit 1;
             fi;
             ACTUAL_SIZE=$(stat -c%s "$MU_PLUGIN_PATH" 2>/dev/null || wc -c < "$MU_PLUGIN_PATH");
             echo "found file: $MU_PLUGIN_PATH";
             echo "expected size=$EXPECTED_SIZE  actual size=$ACTUAL_SIZE";
             if [ "$ACTUAL_SIZE" -ne "$EXPECTED_SIZE" ]; then
               echo "ERROR: size mismatch - unexpected drift since PR #50 diagnostic - refusing to rename";
               echo "ABORT";
               exit 1;
             fi;
             echo "OK: size matches expected 6861 bytes";

             echo "";
             echo "=====================================================";
             echo "PART B / STEP B2: COMMIT - rename file to .disabled";
             echo "=====================================================";
             mv "$MU_PLUGIN_PATH" "$MU_PLUGIN_DISABLED_PATH";
             MV_STATUS=$?;
             if [ "$MV_STATUS" -ne 0 ]; then
               echo "ERROR: mv failed with exit code $MV_STATUS";
               echo "ABORT";
               exit 1;
             fi;
             echo "OK: renamed to $MU_PLUGIN_DISABLED_PATH";

             echo "";
             echo "=====================================================";
             echo "PART B / STEP B3: VERIFY - confirm original gone, disabled file present with same size";
             echo "=====================================================";
             if [ -f "$MU_PLUGIN_PATH" ]; then
               echo "ERROR: original .php file still exists at $MU_PLUGIN_PATH after rename";
               echo "ABORT";
               exit 1;
             fi;
             echo "OK: original .php path no longer exists";

             if [ ! -f "$MU_PLUGIN_DISABLED_PATH" ]; then
               echo "ERROR: .disabled file not found at $MU_PLUGIN_DISABLED_PATH after rename";
               echo "ABORT";
               exit 1;
             fi;
             NEW_SIZE=$(stat -c%s "$MU_PLUGIN_DISABLED_PATH" 2>/dev/null || wc -c < "$MU_PLUGIN_DISABLED_PATH");
             echo "disabled file size=$NEW_SIZE";
             if [ "$NEW_SIZE" -ne "$EXPECTED_SIZE" ]; then
               echo "ERROR: disabled file size ($NEW_SIZE) does not match pre-rename size ($EXPECTED_SIZE) - contents may have changed";
               echo "ABORT";
               exit 1;
             fi;
             echo "OK: verification passed - mu-plugin retired cleanly, contents unchanged";

             echo "";
             echo "OK: workflow completed successfully"'
