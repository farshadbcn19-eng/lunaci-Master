name: Fix Shop Task 1 - assign product featured images

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Assign _thumbnail_id for 8 target products (gated by fresh re-read + on-disk file check)
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";

             echo "" | base64 -d > /tmp/fix-shop-task1-images.php;

             php -l /tmp/fix-shop-task1-images.php;
             LINT_STATUS=$?;
             if [ "$LINT_STATUS" -ne 0 ]; then
               echo "ABORT: php -l failed on fix script";
               rm -f /tmp/fix-shop-task1-images.php;
               exit 1;
             fi;

             wp eval-file /tmp/fix-shop-task1-images.php --path="$WP_PATH";
             EVAL_STATUS=$?;
             rm -f /tmp/fix-shop-task1-images.php;
             if [ "$EVAL_STATUS" -ne 0 ]; then
               echo "ABORT: wp eval-file failed (exit code $EVAL_STATUS) - Task 1 did NOT complete successfully";
               exit 1;
             fi;
             echo "OK: Task 1 workflow completed successfully"'
