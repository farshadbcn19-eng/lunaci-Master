name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Push fixed HTML into post_content for Home and About, purge cache
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          cat > /tmp/remote_push.sh <<'REMOTE_EOF'
          set -e
          WPPATH="$HOME/domains/lunacibarcelona.com/public_html"
          cd "$WPPATH/wp-content/themes/lunaci"
          echo "=== updating home (ID 57) ==="
          wp post update 57 --post_content="$(cat pages/home.html)" --path="$WPPATH" --allow-root
          echo "=== updating about (ID 59) ==="
          wp post update 59 --post_content="$(cat pages/about.html)" --path="$WPPATH" --allow-root
          echo "=== purging cache ==="
          wp litespeed-purge all --path="$WPPATH" --allow-root
          echo "=== all done ==="
          REMOTE_EOF
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" bash -s < /tmp/remote_push.sh
