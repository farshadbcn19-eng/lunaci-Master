name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Home page - cart icon exact markup (line-based, file has 778 lines)
        run: |
          curl -s https://lunacibarcelona.com/ -o /tmp/home.html
          echo "=== line number of ln-nav__cart ==="
          grep -n "ln-nav__cart" /tmp/home.html
          echo "=== 6 lines of context ==="
          grep -n "ln-nav__cart" /tmp/home.html | cut -d: -f1 | while read -r LN; do
            sed -n "$((LN-1)),$((LN+5))p" /tmp/home.html
          done

      - name: Contact page - does site-header contain a nested nav
        run: |
          curl -sL https://lunacibarcelona.com/contact/ -o /tmp/contact.html
          echo "=== line number of site-header open tag ==="
          grep -n '<header id="site-header"' /tmp/contact.html
          echo "=== line number of matching close for that first header ==="
          awk '/<header id="site-header"/{start=NR} start && /<\/header>/{print NR; exit}' /tmp/contact.html
          echo "=== full content of site-header block ==="
          START=$(grep -n '<header id="site-header"' /tmp/contact.html | head -1 | cut -d: -f1)
          END=$(awk -v s="$START" 'NR>=s && /<\/header>/{print NR; exit}' /tmp/contact.html)
          sed -n "${START},${END}p" /tmp/contact.html
          echo "=== does that block contain a <nav ==="
          sed -n "${START},${END}p" /tmp/contact.html | grep -c "<nav"
