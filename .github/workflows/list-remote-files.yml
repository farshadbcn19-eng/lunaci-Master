name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Pull Home and About post_content via wp-cli (base64-safe transport)
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          cat > /tmp/remote_pull.sh <<'REMOTE_EOF'
          set -e
          cd "$HOME/domains/lunacibarcelona.com/public_html"
          echo "--- page list ---"
          wp post list --post_type=page --fields=ID,post_title,post_name --allow-root
          HOME_ID=$(wp post list --post_type=page --name=home --field=ID --allow-root)
          ABOUT_ID=$(wp post list --post_type=page --name=about-us --field=ID --allow-root)
          echo "HOME_ID=$HOME_ID ABOUT_ID=$ABOUT_ID"
          echo "===HOME_B64_START==="
          wp post get "$HOME_ID" --field=post_content --allow-root | base64 -w0
          echo ""
          echo "===HOME_B64_END==="
          echo "===ABOUT_B64_START==="
          wp post get "$ABOUT_ID" --field=post_content --allow-root | base64 -w0
          echo ""
          echo "===ABOUT_B64_END==="
          REMOTE_EOF
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" bash -s < /tmp/remote_pull.sh
