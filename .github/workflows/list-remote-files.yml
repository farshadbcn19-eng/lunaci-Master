name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Products page - all href links, filtered
        run: |
          curl -s https://lunacibarcelona.com/products/ | grep -oP '(?<=href=")[^"]*(?=")' | grep -v "fonts\|css\|js\|png\|jpg\|wp-content\|wp-includes\|#" | head -20

      - name: Contact page - all href links, filtered
        run: |
          curl -s https://lunacibarcelona.com/contact/ | grep -oP '(?<=href=")[^"]*(?=")' | grep -v "fonts\|css\|js\|png\|jpg\|wp-content\|wp-includes\|#" | head -20
