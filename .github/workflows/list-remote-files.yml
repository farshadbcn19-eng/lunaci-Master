name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Inspect nav markup on About, Contact, Shop, Collections pages
        run: |
          declare -A pages=( [about]="about-us/" [contact]="contact/" [shop]="shop/" [collections]="collections/" )
          for label in "${!pages[@]}"; do
            path="${pages[$label]}"
            url="https://lunacibarcelona.com/$path"
            echo "=== $label ($url) ==="
            curl -sL -o "/tmp/page-$label.html" "$url"
            echo "Bytes: $(wc -c < /tmp/page-$label.html)"
            echo "-- <nav> tags --"
            grep -o '<nav[^>]*>' "/tmp/page-$label.html" | sort -u
            echo "-- lunaci-nav-toggle present? --"
            grep -c 'lunaci-nav-toggle' "/tmp/page-$label.html" || echo 0
            echo "-- ln-nav-toggle / ln- toggle hints --"
            grep -ioE 'class="[^"]*(ln-[a-z-]*toggle|toggle[a-z-]*)[^"]*"' "/tmp/page-$label.html" | sort -u | head -10
            echo "-- elementor menu toggle indicators --"
            grep -oE 'elementor-menu-toggle[a-zA-Z_-]*' "/tmp/page-$label.html" | sort -u
            echo "-- hamburger/burger/mobile-menu class hints --"
            grep -ioE 'class="[^"]*(hamburger|burger|mobile-menu)[^"]*"' "/tmp/page-$label.html" | sort -u | head -10
            echo "-- header tag --"
            grep -o '<header[^>]*>' "/tmp/page-$label.html" | sort -u
            echo ""
          done
