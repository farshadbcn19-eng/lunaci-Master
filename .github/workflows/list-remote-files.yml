name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Verify deploy, purge cache, and recheck live page
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" \
            'echo "--- md5sum ---"; \
             md5sum ~/domains/lunacibarcelona.com/public_html/wp-content/themes/lunaci/pages/products.html; \
             echo "--- cache purge ---"; \
             wp litespeed-purge all --path="$HOME/domains/lunacibarcelona.com/public_html" --allow-root 2>/dev/null || wp cache flush --path="$HOME/domains/lunacibarcelona.com/public_html" --allow-root'

          echo "--- live /products/ recheck ---"
          url="https://lunacibarcelona.com/products/"
          curl -sL -o /tmp/products-live.html "$url"
          echo "lunaci-nav-toggle count: $(grep -c 'lunaci-nav-toggle' /tmp/products-live.html || echo 0)"
          echo "logo style height:75px occurrences: $(grep -c 'height:75px' /tmp/products-live.html || echo 0)"
          echo "lunaci-card count: $(grep -c 'lunaci-card' /tmp/products-live.html || echo 0)"
