name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Re-check live /products/ for hero markup after LiteSpeed purge
        run: |
          url="https://lunacibarcelona.com/products/"
          curl -sL -o /tmp/products-live.html "$url"
          echo "about-hero occurrences: $(grep -c 'about-hero' /tmp/products-live.html || echo 0)"
          echo "lunaci-hero-image occurrences: $(grep -c 'lunaci-hero-image' /tmp/products-live.html || echo 0)"
          echo "lunaci-card count: $(grep -c 'lunaci-card' /tmp/products-live.html || echo 0)"
