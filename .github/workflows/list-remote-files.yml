name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Home page - cart icon exact markup
        run: |
          curl -s https://lunacibarcelona.com/ -o /tmp/home.html
          echo "=== bytes: $(wc -c < /tmp/home.html) ==="
          echo "=== context around ln-nav__cart (800 chars from match) ==="
          grep -o 'ln-nav__cart.\{800\}' /tmp/home.html | head -1
          echo "=== any other cart/bag/basket class names anywhere on page? ==="
          grep -o 'class="[^"]*\(cart\|bag\|basket\)[^"]*"' /tmp/home.html | sort -u
          echo "=== id attributes containing cart/bag/basket ==="
          grep -o 'id="[^"]*\(cart\|bag\|basket\)[^"]*"' /tmp/home.html | sort -u

      - name: Home page - is site actually minified single-line
        run: |
          echo "=== line count of home.html ==="
          wc -l /tmp/home.html

      - name: Contact page - check header>nav selector uniqueness
        run: |
          curl -sL https://lunacibarcelona.com/contact/ -o /tmp/contact.html
          echo "=== bytes: $(wc -c < /tmp/contact.html) ==="
          echo "=== all <header ...> opening tags on the page ==="
          grep -o '<header[^>]*>' /tmp/contact.html
          echo "=== is there a <nav> anywhere between the FIRST header tag and its matching close, i.e. does site-header contain a nav? (context 400 chars after first <header) ==="
          grep -o '<header id="site-header"[^"]*".\{600\}' /tmp/contact.html | head -1
