name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Home page - full nav block incl cart icon
        run: |
          curl -s https://lunacibarcelona.com/ -o /tmp/home.html
          echo "=== lines around <nav id=\"lnNav\"> through </nav> ==="
          awk '/<nav id="lnNav"/{f=1} f{print} /<\/nav>/{if(f){exit}}' /tmp/home.html

      - name: Products page - all anchors inside nav
        run: |
          curl -sL https://lunacibarcelona.com/products/ -o /tmp/products.html
          echo "=== bytes: $(wc -c < /tmp/products.html) ==="
          echo "=== full nav block ==="
          awk '/<nav class="lunaci-nav"/{f=1} f{print} /<\/nav>/{if(f){exit}}' /tmp/products.html
          echo "=== all <a> tags inside nav (text + href), extracted ==="
          awk '/<nav class="lunaci-nav"/{f=1} f{print} /<\/nav>/{if(f){exit}}' /tmp/products.html | grep -o '<a [^>]*>[^<]*</a>'

      - name: Contact page - full nav block and toggle state
        run: |
          curl -sL https://lunacibarcelona.com/contact/ -o /tmp/contact.html
          echo "=== bytes: $(wc -c < /tmp/contact.html) ==="
          echo "=== lines 805-835 raw ==="
          sed -n '805,835p' /tmp/contact.html
          echo "=== does lunaci-mobile-toggle appear near this nav? ==="
          grep -c "lunaci-mobile-toggle\|lunaci-collapsible-links" /tmp/contact.html
