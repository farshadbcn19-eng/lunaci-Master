name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Check for lunaci-card elements and hero image src on live /products/
        run: |
          url="https://lunacibarcelona.com/products/"
          curl -sL -o /tmp/products-live.html "$url"
          echo "Bytes: $(wc -c < /tmp/products-live.html)"
          echo "--- lunaci-card count ---"
          grep -c 'lunaci-card' /tmp/products-live.html || echo 0
          echo "--- hero-related img/background-image src values ---"
          grep -o 'src="[^"]*"' /tmp/products-live.html | grep -iE 'hero|model' || echo "NONE via src="
          grep -o "url([^)]*)" /tmp/products-live.html | grep -iE 'hero|model' || echo "NONE via url()"
          echo "--- any 'about-hero' occurrence ---"
          grep -c 'about-hero' /tmp/products-live.html || echo 0
