name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Products page - raw grep as requested
        run: |
          curl -s https://lunacibarcelona.com/products/ | grep -A2 "lunaci-collapsible-links\|lunaci-mobile-toggle\|<nav\|<ul\|<li\|</ul\|</nav" | head -60

      - name: Contact page - raw grep as requested
        run: |
          curl -s https://lunacibarcelona.com/contact/ | grep -A2 "lunaci-collapsible-links\|lunaci-mobile-toggle\|<nav\|<ul\|<li\|</ul\|</nav" | head -60
