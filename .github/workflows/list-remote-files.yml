name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Purge LiteSpeed cache
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" "wp litespeed-purge all --path=\$HOME/domains/lunacibarcelona.com/public_html --allow-root"

      - name: Verify global nav overlay deployed live
        run: |
          echo "=== Home page markers ==="
          curl -s https://lunacibarcelona.com/ -o /tmp/home.html
          grep -c "lunaci-global-toggle\|lunaci-global-nav-overlay" /tmp/home.html
          echo "=== Products page markers + native toggle hidden rule ==="
          curl -sL https://lunacibarcelona.com/products/ -o /tmp/products.html
          grep -c "lunaci-global-toggle\|lunaci-global-nav-overlay" /tmp/products.html
          grep -c "#lunaci-nav-toggle" /tmp/products.html
          echo "=== Contact page markers ==="
          curl -sL https://lunacibarcelona.com/contact/ -o /tmp/contact.html
          grep -c "lunaci-global-toggle\|lunaci-global-nav-overlay" /tmp/contact.html
          echo "=== About page markers ==="
          curl -sL https://lunacibarcelona.com/about-us/ -o /tmp/about.html
          grep -c "lunaci-global-toggle\|lunaci-global-nav-overlay" /tmp/about.html
          echo "=== overlay link content (from Home page copy) ==="
          LN=$(grep -n 'id="lunaci-global-nav-overlay"' /tmp/home.html | head -1 | cut -d: -f1)
          sed -n "${LN},$((LN+5))p" /tmp/home.html
