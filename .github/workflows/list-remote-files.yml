name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Set up Node for headless browser check
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install --with-deps chromium > /dev/null 2>&1

      - name: Real browser check - Products active-link visibility and Contact toggle state
        run: |
          cat > check.js <<'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch();

            // ===== 1. Products page: is the "Products" (active) link hidden? =====
            {
              const page = await browser.newPage({ viewport: { width: 375, height: 812 } });
              await page.goto('https://lunacibarcelona.com/products/', { waitUntil: 'networkidle' });
              console.log('=== PRODUCTS PAGE ===');

              const before = await page.evaluate(() => {
                const links = Array.from(document.querySelectorAll('#lunaci-nav-links a'));
                return links.map(a => {
                  const cs = getComputedStyle(a);
                  return { text: a.textContent.trim(), display: cs.display, visibility: cs.visibility, opacity: cs.opacity, isActive: a.classList.contains('is-active') };
                });
              });
              console.log('BEFORE click:', JSON.stringify(before, null, 2));

              const toggle = await page.$('#lunaci-nav-toggle');
              console.log('toggle found:', !!toggle);
              if (toggle) {
                await toggle.click();
                await page.waitForTimeout(500);
              }

              const after = await page.evaluate(() => {
                const links = Array.from(document.querySelectorAll('#lunaci-nav-links a'));
                return links.map(a => {
                  const cs = getComputedStyle(a);
                  const rect = a.getBoundingClientRect();
                  return { text: a.textContent.trim(), display: cs.display, visibility: cs.visibility, opacity: cs.opacity, isActive: a.classList.contains('is-active'), width: rect.width, height: rect.height };
                });
              });
              console.log('AFTER click:', JSON.stringify(after, null, 2));
              await page.close();
            }

            // ===== 2. Contact page: exact 3 questions asked =====
            {
              const page = await browser.newPage({ viewport: { width: 375, height: 812 } });
              await page.goto('https://lunacibarcelona.com/contact/', { waitUntil: 'networkidle' });
              console.log('=== CONTACT PAGE ===');

              const beforeDisplay = await page.evaluate(() => {
                const ul = document.querySelector('header > nav ul');
                if (!ul) return { found: false };
                return { found: true, display: getComputedStyle(ul).display, classes: ul.className, anchorCount: ul.querySelectorAll('a').length };
              });
              console.log('BEFORE click - nav ul state:', JSON.stringify(beforeDisplay, null, 2));

              const toggle = await page.$('.lunaci-mobile-toggle');
              console.log('toggle found:', !!toggle);
              if (toggle) {
                await toggle.click();
                await page.waitForTimeout(500);
              }

              const afterDisplay = await page.evaluate(() => {
                const ul = document.querySelector('header > nav ul');
                if (!ul) return { found: false };
                const anchors = Array.from(ul.querySelectorAll('a'));
                return {
                  found: true,
                  display: getComputedStyle(ul).display,
                  classes: ul.className,
                  hasOpenClass: ul.classList.contains('lunaci-nav-open'),
                  hasGenericOpenClass: ul.classList.contains('open'),
                  anchorCount: anchors.length,
                  anchors: anchors.map(a => ({ text: a.textContent.trim(), href: a.href }))
                };
              });
              console.log('AFTER click - nav ul state:', JSON.stringify(afterDisplay, null, 2));
              await page.close();
            }

            await browser.close();
          })().catch(e => { console.error('ERROR:', e.message); process.exit(1); });
          EOF
          node check.js
