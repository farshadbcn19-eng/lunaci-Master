name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Verify deployed mu-plugin, purge cache, check live markers
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          cat > /tmp/remote_check.sh <<'REMOTE_EOF'
          set -e
          WPPATH="$HOME/domains/lunacibarcelona.com/public_html"
          echo "=== mu-plugin file size/timestamp ==="
          ls -la "$WPPATH/wp-content/mu-plugins/lunaci-mobile-nav-fix.php"
          echo "=== deployed file contains fixStaleLinks / collections-2 rewrite? ==="
          grep -c "fixStaleLinks\|collections-2\|about-us" "$WPPATH/wp-content/mu-plugins/lunaci-mobile-nav-fix.php"
          echo "=== purge LiteSpeed cache ==="
          wp litespeed-purge all --path="$WPPATH" --allow-root
          REMOTE_EOF
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" bash -s < /tmp/remote_check.sh

      - name: Check injected JS is present on live pages
        run: |
          echo "=== Home page: fixStaleLinks / full-viewport overlay markers ==="
          curl -s https://lunacibarcelona.com/ | grep -o "fixStaleLinks\|position: fixed\|lunaci-nav-open" | sort | uniq -c
          echo "=== About page: same markers ==="
          curl -sL https://lunacibarcelona.com/about-us/ | grep -o "fixStaleLinks\|position: fixed\|lunaci-nav-open" | sort | uniq -c
