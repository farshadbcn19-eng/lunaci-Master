name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Extract live nav markup structure from about-us page
        run: |
          echo "=== Fetch about-us page ==="
          curl -sL https://lunacibarcelona.com/about-us/ -o /tmp/about.html
          echo "--- Bytes fetched: $(wc -c < /tmp/about.html) ---"
          echo "=== Lines mentioning nav/header/menu/toggle/hamburger/burger (with line numbers) ==="
          grep -n -i -o '<[a-z0-9]*[^>]*\(nav\|header\|menu\|toggle\|hamburger\|burger\)[^>]*>' /tmp/about.html | head -60
          echo "=== does response look like a 404? ==="
          grep -n -i -o '<title>[^<]*</title>' /tmp/about.html | head -3
