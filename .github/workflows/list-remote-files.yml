name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Purge LiteSpeed cache
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" "wp litespeed-purge all --path=\$HOME/domains/lunacibarcelona.com/public_html --allow-root"

      - name: Verify logo fix deployed live
        run: |
          curl -s https://lunacibarcelona.com/products/ -o /tmp/products.html
          echo "=== -webkit-mix-blend-mode present? ==="
          grep -c "webkit-mix-blend-mode" /tmp/products.html
          echo "=== .lunaci-nav solid background rule present? ==="
          LN=$(grep -n '\.lunaci-nav {' /tmp/products.html | tail -1 | cut -d: -f1)
          sed -n "${LN},$((LN+2))p" /tmp/products.html

      - name: Contact page - exact nav header structure (for investigation, no changes)
        run: |
          curl -sL https://lunacibarcelona.com/contact/ -o /tmp/contact.html
          echo "=== line numbers of every header/nav open+close tag ==="
          grep -n '<header\|</header>\|<nav\|</nav>' /tmp/contact.html
          echo "=== full block from first NAV comment through the matching </nav> ==="
          START=$(grep -n '<!-- NAV -->' /tmp/contact.html | head -1 | cut -d: -f1)
          END=$(awk -v s="$START" 'NR>=s && /<\/nav>/{print NR; exit}' /tmp/contact.html)
          sed -n "${START},${END}p" /tmp/contact.html
          echo "=== does the mu-plugin toggle button appear inside this nav block after our JS runs? (static HTML won't show it, but check script presence) ==="
          grep -c "lunaci-mobile-toggle\|lunaci-collapsible-links" /tmp/contact.html
