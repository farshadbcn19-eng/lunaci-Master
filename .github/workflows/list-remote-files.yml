name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/lunacibarcelona-head-request-i5bla2
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Check for WP-CLI and existing Products page (read-only)
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" \
            "echo '--- wp-cli check ---'; \
             which wp || echo 'wp: not found on PATH'; \
             cd ~/domains/lunacibarcelona.com/public_html && \
             (php wp-cli.phar --info 2>/dev/null || wp --info 2>/dev/null || echo 'wp-cli: not runnable'); \
             echo '--- existing pages (slug + status) ---'; \
             (wp post list --post_type=page --fields=ID,post_title,post_name,post_status 2>/dev/null || echo 'wp post list failed (wp-cli likely unavailable)')"
