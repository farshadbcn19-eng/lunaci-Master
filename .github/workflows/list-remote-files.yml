name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Check WordPress front-page settings and post 57 content
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          cat > /tmp/remote_check.sh <<'REMOTE_EOF'
          set -e
          WPPATH="$HOME/domains/lunacibarcelona.com/public_html"
          echo "=== 1. show_on_front ==="
          wp option get show_on_front --path="$WPPATH" --allow-root
          echo "=== 2. page_on_front ==="
          wp option get page_on_front --path="$WPPATH" --allow-root
          echo "=== 3. page_for_posts ==="
          wp option get page_for_posts --path="$WPPATH" --allow-root
          echo "=== 4. post 57 fields (head -20) ==="
          wp post get 57 --fields=ID,post_title,post_name,post_status,post_content --path="$WPPATH" --allow-root | head -20
          REMOTE_EOF
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" bash -s < /tmp/remote_check.sh

      - name: Check live homepage builder markers
        run: |
          echo "=== 5. homepage builder markers ==="
          curl -s https://lunacibarcelona.com/ | grep -i "elementor\|et_pb\|divi\|beaver" | head -5
