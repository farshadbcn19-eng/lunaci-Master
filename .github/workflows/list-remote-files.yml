name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Verify deployed mu-plugin and purge cache
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          cat > /tmp/remote_verify.sh <<'REMOTE_EOF'
          set -e
          WPPATH="$HOME/domains/lunacibarcelona.com/public_html"
          echo "=== mu-plugin file size/timestamp ==="
          ls -la "$WPPATH/wp-content/mu-plugins/lunaci-mobile-nav-fix.php"
          echo "=== deployed file contains new markers? ==="
          grep -c "lunaci-collapsible-links\|header > nav\|filenameMap" "$WPPATH/wp-content/mu-plugins/lunaci-mobile-nav-fix.php"
          echo "=== products.html contains Contact link? ==="
          grep -c 'href="/contact/" class="lunaci-nav-link"' "$WPPATH/wp-content/themes/lunaci/pages/products.html"
          echo "=== purge LiteSpeed cache ==="
          wp litespeed-purge all --path="$WPPATH" --allow-root
          REMOTE_EOF
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" bash -s < /tmp/remote_verify.sh

      - name: Check live pages for new markers
        run: |
          echo "=== Home: collapsible-links / header>nav markers ==="
          curl -s https://lunacibarcelona.com/ | grep -o "lunaci-collapsible-links\|filenameMap" | sort | uniq -c
          echo "=== Contact: same markers, plus Contact link in nav ul ==="
          curl -sL https://lunacibarcelona.com/contact/ | grep -o "lunaci-collapsible-links\|filenameMap" | sort | uniq -c
          echo "=== Products page: Contact link present, CTA hide rule present ==="
          curl -sL https://lunacibarcelona.com/products/ | grep -o 'href="/contact/" class="lunaci-nav-link"\|lunaci-nav-cta' | sort | uniq -c
