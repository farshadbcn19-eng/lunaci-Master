name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Inspect Elementor nav markup on Home and About pages
        run: |
          for path in "" "about-us/"; do
            label="${path:-home}"
            url="https://lunacibarcelona.com/$path"
            echo "=== $label ($url) ==="
            curl -sL -o "/tmp/page-$label.html" "$url"
            echo "Bytes: $(wc -c < /tmp/page-$label.html)"
            echo "-- <nav> tags --"
            grep -o '<nav[^>]*>' "/tmp/page-$label.html" | sort -u
            echo "-- elementor menu toggle indicators --"
            grep -oE 'elementor-menu-toggle[a-zA-Z_-]*' "/tmp/page-$label.html" | sort -u
            echo "-- hamburger/toggle/burger class hints --"
            grep -ioE 'class="[^"]*(toggle|hamburger|burger|mobile-menu)[^"]*"' "/tmp/page-$label.html" | sort -u | head -20
            echo "-- header tag --"
            grep -o '<header[^>]*>' "/tmp/page-$label.html" | sort -u
            echo "-- nav menu widget markers --"
            grep -oE 'elementor-nav-menu[a-zA-Z_-]*|elementor-widget-nav-menu' "/tmp/page-$label.html" | sort -u
            echo ""
          done
