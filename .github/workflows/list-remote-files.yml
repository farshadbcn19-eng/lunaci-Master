name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Fetch live product page(s) and inspect rendering
        run: |
          for path in "product" "products"; do
            url="https://lunacibarcelona.com/$path/"
            echo "=== $url ==="
            code=$(curl -sL -o "/tmp/page-$path.html" -w "%{http_code}" "$url")
            echo "HTTP status: $code"
            echo "Bytes: $(wc -c < /tmp/page-$path.html)"
            echo "Title: $(grep -o '<title>[^<]*</title>' /tmp/page-$path.html || echo NONE)"
            echo "Contains raw shortcode text [lunaci_products]: $(grep -c '\[lunaci_products\]' /tmp/page-$path.html || echo 0)"
            echo "Contains lunaci-products container id: $(grep -c 'id=\"lunaci-products\"' /tmp/page-$path.html || echo 0)"
            echo "Contains lunaci-card product cards: $(grep -c 'lunaci-card' /tmp/page-$path.html || echo 0)"
            echo "Contains lunaci-nav-logo: $(grep -c 'lunaci-nav-logo' /tmp/page-$path.html || echo 0)"
            echo "First 500 chars of <body>:"
            sed -n 's/.*<body[^>]*>//p' "/tmp/page-$path.html" | head -c 500
            echo ""
            echo ""
          done

      - name: Inspect shortcode registration and deployed theme file on server
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" \
            'echo "--- mu-plugins dir ---"; ls -la ~/domains/lunacibarcelona.com/public_html/wp-content/mu-plugins/ 2>&1; \
             echo "--- mu-plugin shortcode file content ---"; cat ~/domains/lunacibarcelona.com/public_html/wp-content/mu-plugins/lunaci-products.php 2>&1 || find ~/domains/lunacibarcelona.com/public_html/wp-content/mu-plugins -iname "*lunaci*" -exec cat {} \; ; \
             echo "--- deployed theme products.html size ---"; ls -la ~/domains/lunacibarcelona.com/public_html/wp-content/themes/lunaci/pages/products.html 2>&1; \
             echo "--- active theme ---"; cat ~/domains/lunacibarcelona.com/public_html/wp-content/themes/*/style.css 2>/dev/null | head -20; \
             echo "--- wp-cli check ---"; command -v wp; \
             echo "--- try wp post list for product/products page ---"; wp post list --post_type=page --fields=ID,post_title,post_name,post_status --path=~/domains/lunacibarcelona.com/public_html 2>&1 | head -30'
