name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Purge LiteSpeed cache
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" "wp litespeed-purge all --path=\$HOME/domains/lunacibarcelona.com/public_html --allow-root"

      - name: 1. Home - cart icon hide rule present + element still in DOM
        run: |
          curl -s https://lunacibarcelona.com/ -o /tmp/home.html
          echo "=== is the .ln-nav__cart hide-rule selector line deployed? ==="
          grep -c '\.ln-nav__cart,' /tmp/home.html
          echo "=== full rule text (line-range around it) ==="
          LN=$(grep -n '\.ln-nav__cart,' /tmp/home.html | head -1 | cut -d: -f1)
          sed -n "${LN},$((LN+3))p" /tmp/home.html
          echo "=== is the cart icon element itself still present in the DOM? ==="
          grep -c 'class="ln-nav__cart"' /tmp/home.html

      - name: 2. Products - count and list nav links in hamburger container
        run: |
          curl -sL https://lunacibarcelona.com/products/ -o /tmp/products.html
          echo "=== all <a> tags inside #lunaci-nav-links (line-range based) ==="
          awk '/<div class="lunaci-nav-links"/{f=1} f{print} f && /<\/div>/{exit}' /tmp/products.html | grep -o '<a [^>]*>[^<]*</a>'
          echo "=== count ==="
          awk '/<div class="lunaci-nav-links"/{f=1} f{print} f && /<\/div>/{exit}' /tmp/products.html | grep -oc '<a [^>]*>[^<]*</a>'

      - name: 3. Contact - nav links present + toggle wiring shipped
        run: |
          curl -sL https://lunacibarcelona.com/contact/ -o /tmp/contact.html
          echo "=== nav ul links (raw served HTML, before any client-side JS runs) ==="
          START=$(grep -n '<!-- NAV -->' /tmp/contact.html | head -1 | cut -d: -f1)
          sed -n "${START},$((START+20))p" /tmp/contact.html | grep -o '<a [^>]*>[^<]*</a>'
          echo "=== is the mu-plugin's toggle JS/CSS actually shipped on this page? ==="
          grep -c "lunaci-collapsible-links\|header > nav\|lunaci-mobile-toggle" /tmp/contact.html
          echo "NOTE: curl cannot execute JavaScript, so this confirms the links exist in the DOM the toggle script would act on, and that our script is present and loaded -- but not the actual post-click visual result. That requires a real browser, which is not reachable from this sandbox due to network policy."
