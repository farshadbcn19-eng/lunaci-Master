name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Post-failure state check - confirm nothing was altered
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          cat > /tmp/remote_check2.sh <<'REMOTE_EOF'
          WPPATH="$HOME/domains/lunacibarcelona.com/public_html"

          echo "=== EMPTY_TRASH_DAYS setting ==="
          wp config get EMPTY_TRASH_DAYS --allow-root --path="$WPPATH" 2>&1 || echo "not defined in wp-config"

          echo "=== TRASHED PRODUCTS ==="
          wp post list --post_type=product --post_status=trash --fields=ID,post_title,post_status --allow-root --path="$WPPATH" 2>&1

          echo "=== TARGET IDS CURRENT STATUS ==="
          for id in 50 16 12 46 52 18 20 54 48 14; do
            wp post get "$id" --field=post_status --allow-root --path="$WPPATH" 2>&1 | sed "s/^/id=$id status=/"
          done

          echo "=== BACKUP FILE FROM THIS RUN ==="
          ls -la "$HOME"/lunaci_products_backup_*.csv 2>&1
          REMOTE_EOF
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" bash -s < /tmp/remote_check2.sh
