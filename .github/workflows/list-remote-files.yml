name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Extract live nav markup structure from homepage
        run: |
          echo "=== Fetch homepage, isolate <header>/<nav> region ==="
          curl -s https://lunacibarcelona.com/ -o /tmp/home.html
          echo "--- Bytes fetched: $(wc -c < /tmp/home.html) ---"
          echo "=== Lines mentioning nav/header/menu/toggle/hamburger/burger (with line numbers) ==="
          grep -n -i -o '<[a-z0-9]*[^>]*\(nav\|header\|menu\|toggle\|hamburger\|burger\)[^>]*>' /tmp/home.html | head -60
          echo "=== elementor-location-header marker context ==="
          grep -n -o '.\{80\}elementor-location-header.\{80\}' /tmp/home.html | head -5
