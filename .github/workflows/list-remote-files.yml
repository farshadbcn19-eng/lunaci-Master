name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Raw order-reference query requested by user (read-only)
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          cat > /tmp/remote_query.sh <<'REMOTE_EOF'
          WPPATH="$HOME/domains/lunacibarcelona.com/public_html"
          echo "=== wp db prefix (actual table prefix on this install) ==="
          wp db prefix --allow-root --path="$WPPATH"

          echo "=== Requested query, literal wp_ prefix ==="
          wp db query "SELECT oim.meta_value AS product_id, COUNT(*) AS order_refs FROM wp_woocommerce_order_itemmeta oim WHERE oim.meta_key='_product_id' AND oim.meta_value IN (50,16,12,46,52,18,20,54,48,14) GROUP BY oim.meta_value;" --allow-root --path="$WPPATH" 2>&1
          REMOTE_EOF
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" bash -s < /tmp/remote_query.sh
