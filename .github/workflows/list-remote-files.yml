name: List Remote Uploads (diagnostic)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/hostinger-ssh-setup-w4cmpa
    paths:
      - '.github/workflows/list-remote-files.yml'

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Check for .png variants of product images (read-only)
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PASS: ${{ secrets.HOSTINGER_SSH_PASS }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$SSH_USER@$SSH_HOST" \
            'cd ~/domains/lunacibarcelona.com/public_html/wp-content/uploads && for base in lunaci-lip-liner lunaci-lip-fix lunaci-lipgloss-velvet lunaci-eyebrow-pencil lunaci-eye-pencil-e1781429622606 lunaci-eyeliner lunaci-mascara-volume lunaci-mascara-length lunaci-foundation lunaci-compact-powder lunaci-blush lunaci-nail-polish; do echo "=== $base ==="; find . -iname "$base.png" -o -iname "$base.jpg" 2>/dev/null; done'
