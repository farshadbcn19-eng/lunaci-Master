name: Purge cache and verify Discover Collection links (one-time write)

on:
  workflow_dispatch:

jobs:
  purge-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Purge cache (no data writes) and verify live pages
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";

             echo "---STEP 1: PURGE CACHE (no _elementor_data or any other table touched)---";
             wp litespeed-purge all --path="$WP_PATH";
             PURGE_STATUS=$?;
             if [ "$PURGE_STATUS" -ne 0 ]; then
               echo "litespeed-purge failed (status=$PURGE_STATUS), falling back to wp cache flush";
               wp cache flush --path="$WP_PATH";
             fi;

             echo "---STEP 2: VERIFY /products/ PAGE (cache-bypassed)---";
             http_code=$(curl -s -o /tmp/products_final.html --connect-timeout 10 --max-time 20 -H "Cache-Control: no-cache" -w "%{http_code}" "https://lunacibarcelona.com/products/?nocache=$(date +%s)");
             echo "products_http_code=$http_code";
             echo "page size: $(wc -c < /tmp/products_final.html) bytes";
             grep -qi "fatal error\|critical error" /tmp/products_final.html && echo "FOUND fatal/critical error string on /products/" || echo "no fatal/critical error string found on /products/";
             echo "---precise element counts (exact class attribute match)---";
             echo "cat-card: $(grep -o "class=\"cat-card\"" /tmp/products_final.html | wc -l)";
             echo "cat-link: $(grep -o "class=\"cat-link\"" /tmp/products_final.html | wc -l)";
             echo "cat-name: $(grep -o "class=\"cat-name\"" /tmp/products_final.html | wc -l)";
             echo "---all cat-link hrefs (should be product-category links, not /shop/)---";
             grep -oE "href=\"[^\"]*\" class=\"cat-link\"" /tmp/products_final.html;
             echo "---remaining /shop/ cat-link occurrences (should be 0)---";
             grep -oE "href=\"[^\"]*shop/?\" class=\"cat-link\"" /tmp/products_final.html | wc -l;
             rm -f /tmp/products_final.html;

             echo "---STEP 3: VERIFY HOMEPAGE (cache-bypassed)---";
             home_http_code=$(curl -s -o /tmp/home_final.html --connect-timeout 10 --max-time 20 -H "Cache-Control: no-cache" -w "%{http_code}" "https://lunacibarcelona.com/?nocache=$(date +%s)");
             echo "home_http_code=$home_http_code";
             grep -qi "fatal error\|critical error" /tmp/home_final.html && echo "FOUND fatal/critical error string on homepage" || echo "no fatal/critical error string found on homepage";
             rm -f /tmp/home_final.html'
