name: Create and Activate Hello Elementor Child Theme (one-time write)

on:
  workflow_dispatch:

jobs:
  switch-to-child-theme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Create child theme, activate it, clean up parent, and verify
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 -o ServerAliveInterval=5 -o ServerAliveCountMax=3 \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             CHILD_DIR="$WP_PATH/wp-content/themes/hello-elementor-child";
             echo "---STEP 1+2+3: CREATE CHILD THEME FILES---";
             mkdir -p "$CHILD_DIR";
             echo "LyoKVGhlbWUgTmFtZTogSGVsbG8gRWxlbWVudG9yIENoaWxkClRlbXBsYXRlOiBoZWxsby1lbGVtZW50b3IKVmVyc2lvbjogMS4wLjAKKi8K" | base64 -d > "$CHILD_DIR/style.css";
             echo "" | base64 -d > "$CHILD_DIR/functions.php";
             php -l "$CHILD_DIR/functions.php";
             echo "---STEP 4: CONFIRM CHILD THEME IS DETECTED---";
             wp theme list --path="$WP_PATH";
             echo "---STEP 5: ACTIVATE CHILD THEME---";
             wp theme activate hello-elementor-child --path="$WP_PATH";
             echo "---STEP 6: REMOVE lunaci_category_banner FROM PARENT functions.php---";
             echo "" | base64 -d > /tmp/remove-parent-banner-code.php;
             wp eval-file /tmp/remove-parent-banner-code.php --path="$WP_PATH";
             rm -f /tmp/remove-parent-banner-code.php;
             echo "---STEP 7: CONFIRM ACTIVE THEME IS NOW CHILD---";
             wp theme list --status=active --path="$WP_PATH";
             echo "---STEP 8+9: GET VERIFICATION LINKS---";
             echo "" | base64 -d > /tmp/get-verification-links.php;
             wp eval-file /tmp/get-verification-links.php --path="$WP_PATH" > /tmp/verify-links.txt;
             rm -f /tmp/get-verification-links.php;
             cat /tmp/verify-links.txt;
             echo "-- CURL CHECKS --";
             while IFS=": " read -r key url; do
               if [ -z "$url" ]; then continue; fi;
               echo "== $key ($url) ==";
               http_code=$(curl -s -o /tmp/page.html --connect-timeout 10 --max-time 20 -w "%{http_code}" "$url");
               echo "http_code=$http_code";
               case "$key" in
                 face|eyes|lips|nails)
                   grep -o "class=\"lunaci-category-banner\"" /tmp/page.html || echo "banner div NOT found";
                   ;;
                 home|product)
                   if grep -qi "fatal error" /tmp/page.html; then echo "FATAL ERROR FOUND IN PAGE"; else echo "no fatal error string found"; fi;
                   ;;
               esac;
             done < /tmp/verify-links.txt;
             rm -f /tmp/verify-links.txt /tmp/page.html'
