name: Update Product Prices (One-Time Write)

on:
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update -y && sudo apt-get install -y sshpass

      - name: Update product prices
        run: |
          sshpass -p "${{ secrets.HOSTINGER_SSH_PASS }}" ssh -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }} \
            'WP_PATH="";
             for candidate in "$HOME/public_html" "$HOME" "$(pwd)"; do
               if [ -f "$candidate/wp-config.php" ]; then
                 WP_PATH="$candidate";
                 break;
               fi;
             done;
             if [ -z "$WP_PATH" ]; then
               FOUND=$(find -L "$HOME" -maxdepth 8 -name "wp-config.php" \
                 -not -path "*/wp-content/*" -not -path "*/node_modules/*" 2>/dev/null | head -1);
               if [ -n "$FOUND" ]; then
                 WP_PATH=$(dirname "$FOUND");
               fi;
             fi;
             if [ -z "$WP_PATH" ]; then
               echo "ERROR: could not locate wp-config.php under $HOME";
               exit 1;
             fi;
             echo "WordPress found at: $WP_PATH";
             echo "--- Updating prices ---";
             wp post meta update 324 _regular_price 42.00 --path="$WP_PATH";
             wp post meta update 324 _price 42.00 --path="$WP_PATH";
             wp post meta update 325 _regular_price 41.00 --path="$WP_PATH";
             wp post meta update 325 _price 41.00 --path="$WP_PATH";
             wp post meta update 326 _regular_price 33.00 --path="$WP_PATH";
             wp post meta update 326 _price 33.00 --path="$WP_PATH";
             wp post meta update 327 _regular_price 28.90 --path="$WP_PATH";
             wp post meta update 327 _price 28.90 --path="$WP_PATH";
             wp post meta update 328 _regular_price 27.90 --path="$WP_PATH";
             wp post meta update 328 _price 27.90 --path="$WP_PATH";
             wp post meta update 329 _regular_price 33.00 --path="$WP_PATH";
             wp post meta update 329 _price 33.00 --path="$WP_PATH";
             wp post meta update 331 _regular_price 31.00 --path="$WP_PATH";
             wp post meta update 331 _price 31.00 --path="$WP_PATH";
             echo "--- Verification ---";
             for id in 324 325 326 327 328 329 331; do
               title=$(wp post get $id --field=post_title --path="$WP_PATH");
               regprice=$(wp post meta get $id _regular_price --path="$WP_PATH");
               price=$(wp post meta get $id _price --path="$WP_PATH");
               echo "$id | $title | regular_price=$regprice | price=$price";
             done'
